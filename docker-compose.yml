services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Add your Twilio env vars here or use env_file
      - TWIML_ACCOUNT_SID=${TWIML_ACCOUNT_SID}
      - TWIML_API_KEY=${TWIML_API_KEY}
      - TWIML_API_SECRET=${TWIML_API_SECRET}
      - TWIML_APP_SID=${TWIML_APP_SID}
    env_file:
      - .env
    restart: unless-stopped
